    description: >-
      The DreamFactory System API provides administrative management
      capabilities for DreamFactory instances. It allows managing
      services, apps, roles, users, CORS configurations, email
      templates, environment settings, lookups, rate limits, events,
      scripts, and more via REST endpoints under /api/v2/system/.
