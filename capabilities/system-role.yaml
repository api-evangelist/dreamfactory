        idempotent: true
      call: system-role.getrole
      outputParameters:
      - type: object
        mapping: $.
    - name: dreamfactory-update-role
      description: DreamFactory Update role
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: system-role.updaterole
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: dreamfactory-delete-role
      description: DreamFactory Delete role
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: system-role.deleterole
      outputParameters:
      - type: object
        mapping: $.
