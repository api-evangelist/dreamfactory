naftiko: 1.0.0-alpha2
info:
  label: DreamFactory System API — EmailTemplate
  description: 'DreamFactory System API — EmailTemplate. 2 operations. Lead operation: DreamFactory List email templates.
    Self-contained Naftiko capability covering one Dreamfactory business surface.'
  tags:
  - Dreamfactory
  - EmailTemplate
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DREAMFACTORY_API_KEY: DREAMFACTORY_API_KEY
capability:
  consumes:
  - type: http
    namespace: system-emailtemplate
    baseUri: https://{instance}/api/v2
    description: DreamFactory System API — EmailTemplate business capability. Self-contained, no shared references.
    resources:
    - name: system-email_template
      path: /system/email_template
      operations:
      - name: listemailtemplates
        method: GET
        description: DreamFactory List email templates
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createemailtemplate
        method: POST
        description: DreamFactory Create email template
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-DreamFactory-Session-Token
      value: '{{env.DREAMFACTORY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: system-emailtemplate-rest
    port: 8080
    description: REST adapter for DreamFactory System API — EmailTemplate. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/system/email-template
      name: system-email-template
      description: REST surface for system-email_template.
      operations:
      - method: GET
        name: listemailtemplates
        description: DreamFactory List email templates
        call: system-emailtemplate.listemailtemplates
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createemailtemplate
        description: DreamFactory Create email template
        call: system-emailtemplate.createemailtemplate
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: system-emailtemplate-mcp
    port: 9090
    transport: http
    description: MCP adapter for DreamFactory System API — EmailTemplate. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: dreamfactory-list-email-templates
      description: DreamFactory List email templates
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: system-emailtemplate.listemailtemplates
      outputParameters:
      - type: object
        mapping: $.
    - name: dreamfactory-create-email-template
      description: DreamFactory Create email template
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: system-emailtemplate.createemailtemplate
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
