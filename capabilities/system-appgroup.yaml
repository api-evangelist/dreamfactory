naftiko: 1.0.0-alpha2
info:
  label: DreamFactory System API — AppGroup
  description: 'DreamFactory System API — AppGroup. 2 operations. Lead operation: DreamFactory List application groups. Self-contained
    Naftiko capability covering one Dreamfactory business surface.'
  tags:
  - Dreamfactory
  - AppGroup
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DREAMFACTORY_API_KEY: DREAMFACTORY_API_KEY
capability:
  consumes:
  - type: http
    namespace: system-appgroup
    baseUri: https://{instance}/api/v2
    description: DreamFactory System API — AppGroup business capability. Self-contained, no shared references.
    resources:
    - name: system-app_group
      path: /system/app_group
      operations:
      - name: listappgroups
        method: GET
        description: DreamFactory List application groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createappgroup
        method: POST
        description: DreamFactory Create application group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-DreamFactory-Session-Token
      value: '{{env.DREAMFACTORY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: system-appgroup-rest
    port: 8080
    description: REST adapter for DreamFactory System API — AppGroup. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/system/app-group
      name: system-app-group
      description: REST surface for system-app_group.
      operations:
      - method: GET
        name: listappgroups
        description: DreamFactory List application groups
        call: system-appgroup.listappgroups
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createappgroup
        description: DreamFactory Create application group
        call: system-appgroup.createappgroup
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: system-appgroup-mcp
    port: 9090
    transport: http
    description: MCP adapter for DreamFactory System API — AppGroup. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: dreamfactory-list-application-groups
      description: DreamFactory List application groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: system-appgroup.listappgroups
      outputParameters:
      - type: object
        mapping: $.
    - name: dreamfactory-create-application-group
      description: DreamFactory Create application group
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: system-appgroup.createappgroup
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
