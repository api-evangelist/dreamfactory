naftiko: 1.0.0-alpha2
info:
  label: DreamFactory System API — App
  description: 'DreamFactory System API — App. 5 operations. Lead operation: DreamFactory List applications. Self-contained
    Naftiko capability covering one Dreamfactory business surface.'
  tags:
  - Dreamfactory
  - App
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DREAMFACTORY_API_KEY: DREAMFACTORY_API_KEY
capability:
  consumes:
  - type: http
    namespace: system-app
    baseUri: https://{instance}/api/v2
    description: DreamFactory System API — App business capability. Self-contained, no shared references.
    resources:
    - name: system-app
      path: /system/app
      operations:
      - name: listapps
        method: GET
        description: DreamFactory List applications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createapp
        method: POST
        description: DreamFactory Create application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: system-app-id
      path: /system/app/{id}
      operations:
      - name: getapp
        method: GET
        description: DreamFactory Get application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateapp
        method: PATCH
        description: DreamFactory Update application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteapp
        method: DELETE
        description: DreamFactory Delete application
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-DreamFactory-Session-Token
      value: '{{env.DREAMFACTORY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: system-app-rest
    port: 8080
    description: REST adapter for DreamFactory System API — App. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/system/app
      name: system-app
      description: REST surface for system-app.
      operations:
      - method: GET
        name: listapps
        description: DreamFactory List applications
        call: system-app.listapps
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createapp
        description: DreamFactory Create application
        call: system-app.createapp
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/system/app/{id}
      name: system-app-id
      description: REST surface for system-app-id.
      operations:
      - method: GET
        name: getapp
        description: DreamFactory Get application
        call: system-app.getapp
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateapp
        description: DreamFactory Update application
        call: system-app.updateapp
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteapp
        description: DreamFactory Delete application
        call: system-app.deleteapp
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: system-app-mcp
    port: 9090
    transport: http
    description: MCP adapter for DreamFactory System API — App. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: dreamfactory-list-applications
      description: DreamFactory List applications
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: system-app.listapps
      outputParameters:
      - type: object
        mapping: $.
    - name: dreamfactory-create-application
      description: DreamFactory Create application
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: system-app.createapp
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: dreamfactory-get-application
      description: DreamFactory Get application
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: system-app.getapp
      outputParameters:
      - type: object
        mapping: $.
    - name: dreamfactory-update-application
      description: DreamFactory Update application
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: system-app.updateapp
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: dreamfactory-delete-application
      description: DreamFactory Delete application
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: system-app.deleteapp
      outputParameters:
      - type: object
        mapping: $.
