naftiko: 1.0.0-alpha2
info:
  label: DreamFactory System API — CORS
  description: 'DreamFactory System API — CORS. 5 operations. Lead operation: DreamFactory List CORS configurations. Self-contained
    Naftiko capability covering one Dreamfactory business surface.'
  tags:
  - Dreamfactory
  - CORS
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DREAMFACTORY_API_KEY: DREAMFACTORY_API_KEY
capability:
  consumes:
  - type: http
    namespace: system-cors
    baseUri: https://{instance}/api/v2
    description: DreamFactory System API — CORS business capability. Self-contained, no shared references.
    resources:
    - name: system-cors
      path: /system/cors
      operations:
      - name: listcorsconfigs
        method: GET
        description: DreamFactory List CORS configurations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createcorsconfig
        method: POST
        description: DreamFactory Create CORS configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: system-cors-id
      path: /system/cors/{id}
      operations:
      - name: getcorsconfig
        method: GET
        description: DreamFactory Get CORS configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatecorsconfig
        method: PATCH
        description: DreamFactory Update CORS configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletecorsconfig
        method: DELETE
        description: DreamFactory Delete CORS configuration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: X-DreamFactory-Session-Token
      value: '{{env.DREAMFACTORY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: system-cors-rest
    port: 8080
    description: REST adapter for DreamFactory System API — CORS. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/system/cors
      name: system-cors
      description: REST surface for system-cors.
      operations:
      - method: GET
        name: listcorsconfigs
        description: DreamFactory List CORS configurations
        call: system-cors.listcorsconfigs
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcorsconfig
        description: DreamFactory Create CORS configuration
        call: system-cors.createcorsconfig
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/system/cors/{id}
      name: system-cors-id
      description: REST surface for system-cors-id.
      operations:
      - method: GET
        name: getcorsconfig
        description: DreamFactory Get CORS configuration
        call: system-cors.getcorsconfig
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatecorsconfig
        description: DreamFactory Update CORS configuration
        call: system-cors.updatecorsconfig
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletecorsconfig
        description: DreamFactory Delete CORS configuration
        call: system-cors.deletecorsconfig
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: system-cors-mcp
    port: 9090
    transport: http
    description: MCP adapter for DreamFactory System API — CORS. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: dreamfactory-list-cors-configurations
      description: DreamFactory List CORS configurations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: system-cors.listcorsconfigs
      outputParameters:
      - type: object
        mapping: $.
    - name: dreamfactory-create-cors-configuration
      description: DreamFactory Create CORS configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: system-cors.createcorsconfig
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: dreamfactory-get-cors-configuration
      description: DreamFactory Get CORS configuration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: system-cors.getcorsconfig
      outputParameters:
      - type: object
        mapping: $.
    - name: dreamfactory-update-cors-configuration
      description: DreamFactory Update CORS configuration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: system-cors.updatecorsconfig
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: dreamfactory-delete-cors-configuration
      description: DreamFactory Delete CORS configuration
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: system-cors.deletecorsconfig
      outputParameters:
      - type: object
        mapping: $.
