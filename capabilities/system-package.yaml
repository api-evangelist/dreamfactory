naftiko: 1.0.0-alpha2
info:
  label: DreamFactory System API — Package
  description: 'DreamFactory System API — Package. 2 operations. Lead operation: DreamFactory List packages. Self-contained
    Naftiko capability covering one Dreamfactory business surface.'
  tags:
  - Dreamfactory
  - Package
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    DREAMFACTORY_API_KEY: DREAMFACTORY_API_KEY
capability:
  consumes:
  - type: http
    namespace: system-package
    baseUri: https://{instance}/api/v2
    description: DreamFactory System API — Package business capability. Self-contained, no shared references.
    resources:
    - name: system-package
      path: /system/package
      operations:
      - name: listpackages
        method: GET
        description: DreamFactory List packages
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: importpackage
        method: POST
        description: DreamFactory Import package
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-DreamFactory-Session-Token
      value: '{{env.DREAMFACTORY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: system-package-rest
    port: 8080
    description: REST adapter for DreamFactory System API — Package. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/system/package
      name: system-package
      description: REST surface for system-package.
      operations:
      - method: GET
        name: listpackages
        description: DreamFactory List packages
        call: system-package.listpackages
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: importpackage
        description: DreamFactory Import package
        call: system-package.importpackage
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: system-package-mcp
    port: 9090
    transport: http
    description: MCP adapter for DreamFactory System API — Package. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: dreamfactory-list-packages
      description: DreamFactory List packages
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: system-package.listpackages
      outputParameters:
      - type: object
        mapping: $.
    - name: dreamfactory-import-package
      description: DreamFactory Import package
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: system-package.importpackage
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
