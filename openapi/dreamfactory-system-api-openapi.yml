        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    sessionToken:
      type: apiKey
      name: X-DreamFactory-Session-Token
      in: header
      description: Session token obtained after admin login.
    apiKey:
      type: apiKey
      name: X-DreamFactory-API-Key
      in: header
      description: API key associated with a registered application.
  parameters:
    id:
      name: id
      in: path
      required: true
      description: Resource identifier.
      schema:
        type: integer
    fields:
      name: fields
      in: query
      description: Comma-delimited list of fields to return.
      schema:
        type: string
    filter:
      name: filter
      in: query
      description: SQL-like filter to limit results.
      schema:
        type: string
    limit:
      name: limit
      in: query
      description: Maximum number of records to return.
      schema:
        type: integer
        default: 0
    offset:
      name: offset
      in: query
      description: Number of records to skip for pagination.
      schema:
        type: integer
        default: 0
    order:
      name: order
      in: query
      description: SQL-like order containing field and direction.
      schema:
        type: string
    related:
      name: related
      in: query
      description: Comma-delimited list of related resources to include.
      schema:
        type: string
  schemas:
    AdminRequest:
      type: object
      properties:
        name:
          type: string
          description: Display name of the administrator.
        first_name:
          type: string
          description: First name.
        last_name:
          type: string
          description: Last name.
        email:
          type: string
          format: email
          description: Email address (used for login).
        password:
          type: string
          description: Password for the administrator.
        is_active:
          type: boolean
          description: Whether the admin account is active.
      required:
        - email
        - name
    AdminResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        is_active:
          type: boolean
        created_date:
          type: string
          format: date-time
        last_modified_date:
          type: string
          format: date-time
    AdminListResponse:
      type: object
      properties:
        resource:
          type: array
          items:
            $ref: '#/components/schemas/AdminResponse'
    AppRequest:
      type: object
      properties:
        name:
          type: string
          description: Name of the application.
        api_key:
          type: string
          description: API key for the application.
        description:
          type: string
          description: Description of the application.
        is_active:
          type: boolean
          description: Whether the application is active.
        type:
          type: integer
          description: Application type identifier.
        role_id:
          type: integer
          description: Default role ID for the application.
      required:
        - name
    AppResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        api_key:
          type: string
        description:
          type: string
        is_active:
          type: boolean
        type:
          type: integer
        role_id:
          type: integer
        created_date:
          type: string
          format: date-time
        last_modified_date:
          type: string
          format: date-time
    AppListResponse:
      type: object
      properties:
        resource:
          type: array
          items:
            $ref: '#/components/schemas/AppResponse'
    AppGroupRequest:
      type: object
      properties:
        name:
          type: string
          description: Name of the application group.
        description:
          type: string
          description: Description of the group.
      required:
        - name
    CorsRequest:
      type: object
      properties:
        path:
          type: string
          description: API path to apply CORS to.
        origin:
          type: string
          description: Allowed origin.
        header:
          type: string
          description: Allowed headers.
        method:
          type: integer
          description: Bitmask of allowed HTTP methods.
        max_age:
          type: integer
          description: Max age for preflight caching in seconds.
        enabled:
          type: boolean
          description: Whether CORS config is enabled.
      required:
        - path
        - origin
    CorsResponse:
      type: object
      properties:
        id:
          type: integer
        path:
          type: string
        origin:
          type: string
        header:
          type: string
        method:
          type: integer
        max_age:
          type: integer
        enabled:
          type: boolean
        created_date:
          type: string
          format: date-time
        last_modified_date:
          type: string
          format: date-time
    CorsListResponse:
      type: object
      properties:
        resource:
          type: array
          items:
            $ref: '#/components/schemas/CorsResponse'
    EmailTemplateRequest:
      type: object
      properties:
        name:
          type: string
          description: Template name.
        description:
          type: string
          description: Template description.
        to:
          type: string
          description: Default recipient email addresses.
        cc:
          type: string
          description: Default CC email addresses.
        bcc:
          type: string
          description: Default BCC email addresses.
        subject:
          type: string
          description: Email subject template.
        body_text:
          type: string
          description: Plain text body template.
        body_html:
          type: string
          description: HTML body template.
        from_name:
          type: string
          description: Sender display name.
        from_email:
          type: string
          format: email
          description: Sender email address.
        reply_to_name:
          type: string
          description: Reply-to display name.
        reply_to_email:
          type: string
          format: email
          description: Reply-to email address.
      required:
        - name
    EnvironmentResponse:
      type: object
      properties:
        platform:
          type: object
          properties:
            version:
              type: string
            is_hosted:
              type: boolean
        authentication:
          type: object
        server:
          type: object
    LimitRequest:
      type: object
      properties:
        name:
          type: string
          description: Name of the limit.
        description:
          type: string
          description: Description of the limit.
        type:
          type: string
          description: Type of limit (instance, each_user, each_service, etc.).
        rate:
          type: integer
          description: Number of allowed API calls in the period.
        period:
          type: string
          description: Time period for the limit (minute, hour, day, etc.).
        service_id:
          type: integer
          description: Service ID the limit applies to.
        role_id:
          type: integer
          description: Role ID the limit applies to.
        user_id:
          type: integer
          description: User ID the limit applies to.
        is_active:
          type: boolean
          description: Whether the limit is active.
      required:
        - name
        - type
        - rate
        - period
    LimitResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        type:
          type: string
        rate:
          type: integer
        period:
          type: string
        service_id:
          type: integer
        role_id:
          type: integer
        user_id:
          type: integer
        is_active:
          type: boolean
        created_date:
          type: string
          format: date-time
        last_modified_date:
          type: string
          format: date-time
    LimitListResponse:
      type: object
      properties:
        resource:
          type: array
          items:
            $ref: '#/components/schemas/LimitResponse'
    LookupRequest:
      type: object
      properties:
        name:
          type: string
          description: Lookup key name.
        value:
          type: string
          description: Lookup value.
        private:
          type: boolean
          description: Whether the lookup is private (hidden from clients).
        description:
          type: string
          description: Description of the lookup.
      required:
        - name
    LookupResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        value:
          type: string
        private:
          type: boolean
        description:
          type: string
        created_date:
          type: string
          format: date-time
        last_modified_date:
          type: string
          format: date-time
    LookupListResponse:
      type: object
      properties:
        resource:
          type: array
          items:
            $ref: '#/components/schemas/LookupResponse'
    RoleRequest:
      type: object
      properties:
        name:
          type: string
          description: Name of the role.
        description:
          type: string
          description: Description of the role.
        is_active:
          type: boolean
          description: Whether the role is active.
        role_service_access_by_role_id:
          type: array
          description: Service access permissions for the role.
          items:
            type: object
            properties:
              service_id:
                type: integer
              component:
                type: string
              verb_mask:
                type: integer
              requestor_mask:
                type: integer
              filters:
                type: array
                items:
                  type: object
              filter_op:
                type: string
      required:
        - name
    RoleResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        is_active:
          type: boolean
        created_date:
          type: string
          format: date-time
        last_modified_date:
          type: string
          format: date-time
    RoleListResponse:
      type: object
      properties:
        resource:
          type: array
          items:
            $ref: '#/components/schemas/RoleResponse'
    ServiceRequest:
      type: object
      properties:
        name:
          type: string
          description: Unique name for the service (used in API paths).
        label:
          type: string
          description: Display label for the service.
        description:
          type: string
          description: Description of the service.
        type:
          type: string
          description: Service type name.
        is_active:
          type: boolean
          description: Whether the service is active.
        config:
          type: object
          description: >-
            Service configuration object. Schema depends on the
            service type.
      required:
        - name
        - type
    ServiceResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        label:
          type: string
        description:
          type: string
        type:
          type: string
        is_active:
          type: boolean
        config:
          type: object
        created_date:
          type: string
          format: date-time
        last_modified_date:
          type: string
          format: date-time
    ServiceListResponse:
      type: object
      properties:
        resource:
          type: array
          items:
            $ref: '#/components/schemas/ServiceResponse'
    ServiceTypeListResponse:
      type: object
      properties:
        resource:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              label:
                type: string
              description:
                type: string
              group:
                type: string
              singleton:
                type: boolean
              config_schema:
                type: array
                items:
                  type: object
    UserRequest:
      type: object
      properties:
        name:
          type: string
          description: Display name.
        first_name:
          type: string
          description: First name.
        last_name:
          type: string
          description: Last name.
        email:
          type: string
          format: email
          description: Email address (used for login).
        password:
          type: string
          description: Password for the user.
        is_active:
          type: boolean
          description: Whether the user account is active.
        phone:
          type: string
          description: Phone number.
      required:
        - email
        - name
    UserResponse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        is_active:
          type: boolean
        phone:
          type: string
        created_date:
          type: string
          format: date-time
        last_modified_date:
          type: string
          format: date-time
    UserListResponse:
      type: object
      properties:
        resource:
          type: array
          items:
            $ref: '#/components/schemas/UserResponse'
    ResourceListResponse:
      type: object
      properties:
        resource:
          type: array
          items:
            type: object
    ResourceResponse:
      type: object
      properties:
        id:
          type: integer
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
              description: Error code.
            message:
              type: string
              description: Error message.
            context:
              type: object
              description: Additional error context.
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized - invalid or missing session token or API key
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
