openapi: 3.1.0
info:
  title: DreamFactory System API
  description: >-
    The DreamFactory System API provides administrative management
    capabilities for DreamFactory instances. It allows administrators to
    manage services, apps, roles, users, CORS configurations, email
    templates, environment settings, lookups, events, scripts, and more.
    All system resources are accessible under the /api/v2/system/ base
    path. Authentication requires either an X-DreamFactory-Session-Token
    header (for system admins) or an X-DreamFactory-API-Key header (for
    users with appropriate permissions).
  version: 2.0.0
  contact:
    name: DreamFactory Support
    url: https://www.dreamfactory.com/support
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  termsOfService: https://www.dreamfactory.com/terms-of-use
externalDocs:
  description: DreamFactory Documentation
  url: https://guide.dreamfactory.com/docs/
servers:
  - url: https://{instance}/api/v2
    description: DreamFactory instance
    variables:
      instance:
        default: example.dreamfactory.com
        description: Your DreamFactory instance hostname
security:
  - sessionToken: []
  - apiKey: []
tags:
  - name: Admin
    description: System administrator management
  - name: App
    description: Application and API key management
  - name: AppGroup
    description: Application group management
  - name: CORS
    description: Cross-Origin Resource Sharing configuration
  - name: EmailTemplate
    description: Email template management
  - name: Environment
    description: Environment information
  - name: Event
    description: Event management
  - name: Limit
    description: API rate limiting management
  - name: Lookup
    description: Lookup key management
  - name: Role
    description: Role-based access control management
  - name: Service
    description: Service configuration management
  - name: ServiceType
    description: Service type discovery
  - name: ScriptType
    description: Script type discovery
  - name: User
    description: User management
  - name: Custom
    description: Custom settings management
  - name: Package
    description: Package import and export
