        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: setCustomSettings
      summary: Set custom settings
      description: Create or update custom system settings.
      tags:
        - Custom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
